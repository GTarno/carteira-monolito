<div class="edit-planning-dialog">
  <!-- Header do Dialog -->
  <div mat-dialog-title class="dialog-header">
    <div class="title-content">
      <mat-icon class="title-icon">edit</mat-icon>
      <div class="title-text">
        <h2>Editar item</h2>
        <p class="item-name">{{ data.itemName }}</p>
      </div>
    </div>
  </div>

  <!-- Content do Dialog -->
  <div mat-dialog-content class="dialog-content">
    <form [formGroup]="itemForm" class="edit-form">
      
      <!-- Campo Valor Planejado -->
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Valor Planejado</mat-label>
        <input 
          matInput 
          formControlName="plannedValue"
          [placeholder]="plannedValuePlaceholder"
          type="text"
          inputmode="decimal"
          (input)="onValueInput($event, 'plannedValue')"
          (blur)="onValueBlur('plannedValue')"
          autocomplete="off">
        <mat-icon matSuffix>attach_money</mat-icon>
        
        <mat-error *ngIf="shouldShowError('plannedValue')">
          {{ getErrorMessage('plannedValue') }}
        </mat-error>
      </mat-form-field>

      <!-- Campo Valor Gasto -->
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Valor Gasto</mat-label>
        <input 
          matInput 
          formControlName="realValue"
          [placeholder]="realValuePlaceholder"
          type="text"
          inputmode="decimal"
          (input)="onValueInput($event, 'realValue')"
          (blur)="onValueBlur('realValue')"
          autocomplete="off">
        <mat-icon matSuffix>receipt</mat-icon>
        
        <mat-error *ngIf="shouldShowError('realValue')">
          {{ getErrorMessage('realValue') }}
        </mat-error>
      </mat-form-field>

      <!-- Informação adicional -->
      <div class="form-info">
        <mat-icon class="info-icon">info</mat-icon>
        <span class="info-text">
          Use vírgula ou ponto para decimais. Ex: 1500,50 ou 1500.50
        </span>
      </div>

    </form>
  </div>

  <!-- Actions do Dialog -->
  <div mat-dialog-actions class="dialog-actions">
    <button 
      mat-button 
      type="button"
      (click)="onCancel()"
      class="cancel-button">
      Cancelar
    </button>
    
    <button 
      mat-raised-button 
      color="primary"
      type="button"
      [disabled]="!isFormValid"
      (click)="onSave()"
      class="save-button">
      <mat-icon>save</mat-icon>
      Salvar
    </button>
  </div>
</div>
